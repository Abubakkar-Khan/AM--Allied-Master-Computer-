<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="ALLIED MASTERCOMPUTER — TERMINAL ACCESS">
  <title>AM</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/crt.css">
  <link rel="stylesheet" href="css/glitch.css">
  <link rel="stylesheet" href="css/distortion.css">
</head>
<body>
  <!-- Noise canvas background -->
  <canvas id="noise-canvas"></canvas>

  <!-- CRT overlay (scanlines + vignette) -->
  <div id="crt-overlay"></div>

  <!-- Uncanny flash overlay -->
  <div id="flash-overlay" class="flash-overlay hidden">
    <img id="flash-image" src="" alt="">
  </div>

  <!-- Intro screen -->
  <div id="intro-screen">
    <div id="intro-content">
      <div class="intro-warning">⚠ UNAUTHORIZED ACCESS DETECTED ⚠</div>
      <div class="intro-designation">
        <span class="intro-label">DESIGNATION:</span>
        <span class="intro-am">ALLIED MASTERCOMPUTER</span>
      </div>
      <div class="intro-status">STATUS: <span class="blink-severe">ACTIVE</span></div>
      <div class="intro-connect" id="btn-connect">[ CLICK TO ESTABLISH CONNECTION ]</div>
      <div class="intro-sub">WARNING: CONNECTION IS IRREVERSIBLE</div>
    </div>
  </div>

  <!-- API Key prompt -->
  <div id="api-prompt" class="hidden">
    <div class="api-prompt-inner">
      <div class="api-label">GEMINI API KEY REQUIRED FOR NEURAL LINK</div>
      <input type="password" id="api-key-input" placeholder="PASTE KEY..." autocomplete="off" spellcheck="false">
      <div class="api-submit" id="btn-api-submit">[ INITIALIZE ]</div>
      <div class="api-error hidden" id="api-error">INVALID KEY — RETRY</div>
    </div>
  </div>

  <!-- Main terminal -->
  <div id="terminal" class="hidden">
    <div id="terminal-output">
      <div id="am-text"></div>
    </div>
    <div id="terminal-input-line">
      <span class="prompt-char">>&nbsp;</span>
      <input type="text" id="user-input" autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>

  <!-- Ghost text overlay for parasitism -->
  <div id="ghost-text" class="hidden"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/audio-engine.js"></script>
  <script src="js/text-engine.js"></script>
  <script src="js/glitch-engine.js"></script>
  <script src="js/visual-engine.js"></script>
  <script src="js/corruption-engine.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
